    <style>

        border: none;
        border-radius: 50px;
        box-shadow: 0 8px 20px rgba(255, 215, 0, 0.4);

    }
    button:hover {
        transform: translateY(-3px);

    }
    button:active {

    #result-card {

        border: 1px solid rgba(255, 255, 255, 0.2);

    #result-text {

    <!-- Supabaseを正常に読み込むための公式CDNスクリプト -->
    <script src="https://jsdelivr.net"></script>
</head>

<body>

    <h1>アニメ名言おみくじ</h1>
    <p>下のボタンを押すと、アニメ名言が飛び出すよ！</p>

    <button onclick="omikuji()">おみくじを引く</button>

    <div id="result-card" onclick="this.style.display='none'">
        <p id="result-text"></p>
        <p style="font-size:12px; color:#aaa; margin:10px 0 0 0;">(画面をクリックして閉じる)</p>
    </div>

    <!-- コメントエリア -->
    <div style="margin-top: 50px; padding: 0 20px;">
        <h2>みんなの感想コメント&追加して欲しい名言＋アニメ</h2>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
            <input type="text" id="comment-input" placeholder="ここに入力してね" style="font-size: 18px; padding: 12px; width: 100%; max-width: 300px; border-radius: 5px; border: none; color: #000000; background-color: #ffffff; box-sizing: border-box;">
            <button onclick="sendComment()" style="font-size: 18px; padding: 10px 30px; width: 100%; max-width: 150px; border-radius: 5px;">送信</button>
        </div>
    </div>

    <!-- コメントリスト -->
    <div id="comment-list" style="margin-top: 30px; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto; max-height: 250px; overflow-y: auto; padding-right: 10px;"></div>

                "「おれはれっきとした人間だぜ…臆病で弱っちい…ただの人間さ…!!」(ドラゴンクエスト ダイの大補険)",
                "「今のはメラゾーマではない…メラだ…」(ドラゴンクエスト ダイの大冒険)",
                "「ここで働かせてください！」(千と千尋の神隠し)",

            const r = Math.floor(Math.random()* meigen.length);
            document.getElementById("result-text").innerText = meigen[r];
            document.getElementById("result-card").style.display = "block";
        }

        // 🔑Supabaseの接続キー（あなたの環境専用のものです）
        const SUPABASE_URL = "https://supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2aHZjZGRmbG5lY3FtcWNrc3lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NDAxNTgsImV4cCI6MjA5NDQxNjE1OH0.-0HLXrVjUjq8drNQX4J5poHdnafIOrdYNGyV1fHzdac";

        let supabaseClient = null;
        try {
            supabaseClient = supabase.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch(e) { 
            console.error("Supabaseの初期化に失敗しました:", e); 
        }

        // コメント一覧を読み込む関数
        async function loadComments() {
            if (!supabaseClient) return;
            const { data, error } = await supabaseClient
                .from('comments')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("読み込みエラー:", error);
                return;
            }

            const listDiv = document.getElementById("comment-list");
            listDiv.innerHTML = ""; 

            data.forEach(item => {
                const commentEl = document.createElement("div");
                commentEl.style.padding = "10px";
                commentEl.style.borderBottom = "1px solid rgba(255,255,255,0.1)";
                commentEl.style.fontSize = "14px";
                commentEl.style.wordBreak = "break-all";
                commentEl.innerText = item.text || ""; 
                listDiv.appendChild(commentEl);
            });
        }

        // コメントを送信する関数
        async function sendComment() {
            if (!supabaseClient) return;

            const inputEl = document.getElementById("comment-input");
            const text = inputEl.value.trim();

            if (text === "") {
                alert("コメントを入力してください！");
                return;
            }

            const { error } = await supabaseClient
                .from('comments')
                .insert([{ text: text }]);

            if (error) {
                console.error("送信エラー:", error);
                alert("送信に失敗しました。SupabaseのRLS設定を確認してください。");
            } else {
                inputEl.value = ""; 
                loadComments(); 
            }
        }

        // ページを開いた時に自動実行
        window.onload = function() {
            loadComments();
        };
    </script>
</body>
</html>
