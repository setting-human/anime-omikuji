        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        } catch(e) { 
            console.error("Supabaseの初期化に失敗しました:", e); 
        }
        // コメント一覧を読み込む関数
        async function loadComments() {
            if (!supabaseClient) return;
            const { data, error } = await supabaseClient
                .from('comments')
                .select('*', { head: false }) // ← 正しい通信のヘッダー形式に直しました
                .order('created_at', { ascending: false });

            if (error) {
                console.error("読み込みエラー:", error);
                return;
            }

            const listDiv = document.getElementById("comment-list");
            listDiv.innerHTML = ""; 

            data.forEach(item => {
                const commentEl = document.createElement("div");
                commentEl.style.padding = "10px";
                commentEl.style.borderBottom = "1px solid rgba(255,255,255,0.1)";
                commentEl.style.fontSize = "14px";
                commentEl.style.wordBreak = "break-all";
                commentEl.innerText = item.text || ""; 
                listDiv.appendChild(commentEl);
            });
        }



        // コメントを送信する関数
        async function sendComment() {
            if (!supabaseClient) return;

            const inputEl = document.getElementById("comment-input");
            const text = inputEl.value.trim();

            if (text === "") {
                alert("コメントを入力してください！");
                return;
            }

            const { error } = await supabaseClient
                .from('comments')
                .insert([{ text: text }]);

            if (error) {
                console.error("送信エラー:", error);
                alert("送信に失敗しました。SupabaseのRLS設定を確認してください。");
            } else {
                inputEl.value = ""; 
                loadComments(); 
            }
        }

        // ページを開いた時に自動実行
        window.onload = function() {
            loadComments();
        };
